<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Legends: Online</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="domain-overlay"></div>
    <div id="auth-layer" class="layer">
        <div class="auth-box">
            <h1>ARENA LEGENDS</h1>
            <p class="subtitle">Online RPG Battle Arena</p>
            <button id="btn-login" class="btn-primary">Entrar com Google</button>
            <p id="auth-status" class="status-text"></p>
        </div>
    </div>

    <div id="menu-layer" class="layer hidden">
        <header class="menu-header">
            <h1>ARENA LEGENDS</h1>
            <div class="player-badge">
                <span id="player-name">Jogador</span>
                <button id="btn-logout" class="btn-small">Sair</button>
            </div>
        </header>
        <div class="menu-content">
            <div class="section">
                <h2>Selecione seu Campeão</h2>
                <div class="char-grid" id="char-grid"></div>
            </div>
            <div class="section sidebar">
                <div class="profile-card">
                    <h3>Seu Perfil</h3>
                    <p>Nível: <span id="profile-level">1</span></p>
                    <p>Moedas: <span id="profile-coins">0</span></p>
                    <p>Vitórias: <span id="profile-wins">0</span></p>
                    <p>Derrotas: <span id="profile-losses">0</span></p>
                </div>
                <button id="btn-play" class="btn-primary" disabled>SELECIONE 2</button>
            </div>
        </div>
    </div>

    <div id="game-layer" class="layer hidden">
        <canvas id="arena"></canvas>
        <div class="hud">
            <div class="p-stat left">
                <span class="p-name" id="n1">P1</span>
                <div class="bar-bg"><div class="hp-bar" id="h1"></div></div>
                <div class="bar-bg thin"><div class="mana-bar" id="m1"></div></div>
            </div>
            <div class="p-stat right">
                <span class="p-name" id="n2">P2</span>
                <div class="bar-bg"><div class="hp-bar" id="h2"></div></div>
                <div class="bar-bg thin"><div class="mana-bar" id="m2"></div></div>
            </div>
        </div>
        <div id="final-text" class="hidden"></div>
        <button id="btn-back" class="btn-overlay">Voltar ao Menu</button>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
